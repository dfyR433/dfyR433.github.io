<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA WARS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0d1f, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial', monospace;
            touch-action: pan-y pinch-zoom;
        }

        .game-wrapper {
            background: #0b121f;
            border-radius: 3.8rem;
            padding: 1.5rem 1.5rem 2rem;
            box-shadow: 0 35px 70px rgba(0, 255, 255, 0.7), 0 0 0 4px cyan inset, 0 0 50px cyan;
            max-width: 1000px;
            width: fit-content;
            margin: 10px;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.5rem 1rem;
            color: #e6f7ff;
            text-shadow: 0 0 10px cyan;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title h1 {
            font-size: clamp(1.8rem, 6vw, 2.6rem);
            background: linear-gradient(45deg, cyan, #ff77ff, cyan);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 20px cyan);
            letter-spacing: 4px;
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            background: #0e1f2b;
            padding: 0.5rem 1.5rem;
            border-radius: 5rem;
            border: 2px solid #0ff;
            box-shadow: 0 0 30px #0ff;
            font-size: clamp(1.2rem, 4vw, 2rem);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .stat span {
            color: #ffffaa;
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 900px;
            height: auto;
            aspect-ratio: 900 / 650;
            border-radius: 45px;
            background: #030c15;
            box-shadow: 0 0 0 4px #00f2ff, 0 0 0 9px #124a55, 0 30px 50px black;
            cursor: none;
            touch-action: none;
        }

        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding: 0 0.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .key-hint {
            font-size: 1.4rem;
            color: #b2ecf5;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .key-hint kbd {
            background: #1f3d4a;
            color: #f0ffff;
            border-radius: 1.2rem;
            padding: 0.4rem 1.2rem;
            font-size: 1.8rem;
            border: 2px solid cyan;
            box-shadow: 0 0 15px cyan;
        }

        .touch-controls {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .touch-btn {
            background: #172e3a;
            border: none;
            font-size: 2.5rem;
            font-weight: bold;
            color: #c6fdff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 0 0 0 3px cyan, 0 0 40px cyan;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .touch-btn:active {
            background: #4afcff;
            color: black;
            transform: scale(1.1);
        }

        .fire-btn {
            background: #2a1f3a;
            box-shadow: 0 0 0 3px #f6f, 0 0 40px #f6f;
            width: 100px;
        }

        .action-btns {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .restart-btn, .audio-btn {
            background: #172e3a;
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            color: #c6fdff;
            padding: 0.6rem 1.8rem;
            border-radius: 4rem;
            box-shadow: 0 0 0 2px cyan, 0 0 30px cyan;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            touch-action: manipulation;
        }

        .restart-btn:hover, .audio-btn:hover {
            background: #255064;
            color: white;
            box-shadow: 0 0 0 4px cyan, 0 0 70px cyan;
        }

        .audio-btn {
            background: #2a1f3a;
            box-shadow: 0 0 0 2px #f6f, 0 0 30px #f6f;
        }

        @media (max-width: 600px) {
            .game-wrapper {
                padding: 1rem;
                border-radius: 2rem;
            }
            .touch-btn {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
            .fire-btn {
                width: 90px;
            }
            .key-hint {
                font-size: 1.2rem;
            }
            .key-hint kbd {
                font-size: 1.4rem;
                padding: 0.3rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="stats-panel">
            <div class="title"><h1>⚡ ULTRA WARS ⚡</h1></div>
            <div class="stats">
                <div class="stat">🔰 <span id="levelDisplay">1</span></div>
                <div class="stat">💥 <span id="scoreDisplay">0</span></div>
                <div class="stat">❤️ <span id="livesDisplay">3</span></div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas" width="900" height="650"></canvas>
        </div>

        <!-- Touch controls -->
        <div class="touch-controls">
            <button class="touch-btn" id="touchLeft">←</button>
            <button class="touch-btn" id="touchRight">→</button>
            <button class="touch-btn fire-btn" id="touchFire">⚡</button>
        </div>

        <div class="control-bar">
            <div class="key-hint">
                <kbd>←</kbd><kbd>→</kbd> <kbd>␣</kbd>
            </div>
            <div class="action-btns">
                <button class="audio-btn" id="audioEnableBtn">🔈 AUDIO</button>
                <button class="restart-btn" id="restartButton">⟲ RESTART</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- CANVAS ----------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const levelSpan = document.getElementById('levelDisplay');
            const scoreSpan = document.getElementById('scoreDisplay');
            const livesSpan = document.getElementById('livesDisplay');
            const restartBtn = document.getElementById('restartButton');
            const audioEnableBtn = document.getElementById('audioEnableBtn');

            // Touch buttons
            const touchLeft = document.getElementById('touchLeft');
            const touchRight = document.getElementById('touchRight');
            const touchFire = document.getElementById('touchFire');

            // ---------- FIXED DIMENSIONS ----------
            const W = 900, H = 650;

            // ---------- AUDIO CONTEXT ----------
            let audioCtx = null;
            let soundsEnabled = false;

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                soundsEnabled = true;
                audioEnableBtn.textContent = '🔊 AUDIO ON';
                audioEnableBtn.style.background = '#2d4a3a';
            }

            function playLaser() {
                if (!soundsEnabled || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.value = 880;
                gain.gain.value = 0.15;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.stop(audioCtx.currentTime + 0.15);
            }

            function playExplosion() {
                if (!soundsEnabled || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }

            function playLevelUp() {
                if (!soundsEnabled || !audioCtx) return;
                const now = audioCtx.currentTime;
                for (let i = 0; i < 3; i++) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 600 + i * 200;
                    gain.gain.value = 0.1;
                    osc.connect(gain).connect(audioCtx.destination);
                    osc.start(now + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.2);
                    osc.stop(now + i * 0.1 + 0.2);
                }
            }

            function playGameOver() {
                if (!soundsEnabled || !audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            }

            audioEnableBtn.addEventListener('click', () => {
                initAudio();
                if (audioCtx) playLevelUp();
            });

            // ---------- GAME STATE ----------
            let gameActive = true;
            let gameOverMessage = '';
            let level = 1;
            let score = 0;
            let lives = 3;
            let invulnerableFrames = 0;

            // Player
            const player = {
                x: W/2 - 30,
                y: H - 85,
                w: 60,
                h: 45
            };

            // Lasers
            let lasers = [];
            let laserCooldown = 0;
            const LASER_COOLDOWN = 10;
            const LASER_SPEED = -10;

            // Enemies
            let enemies = [];
            let enemyBullets = [];
            let enemyDirection = 1;
            const ENEMY_BASE_SPEED = 1.3;
            const ENEMY_STEP_DOWN = 18;

            // Level transition
            let levelTransitionTimer = 0;
            const LEVEL_TRANSITION_DELAY = 90;

            // Animations
            let explosions = [];
            let thrusterPhase = 0;
            let ufoLightPhase = 0;

            // Boss-specific
            let bossActive = false;
            let bossShootTimer = 0;

            // ---------- KEY HANDLING ----------
            const keys = { left: false, right: false, space: false };

            function handleKeyDown(e) {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'Left' || key === 'ArrowRight' || key === 'Right' || key === ' ' || key === 'Space') {
                    e.preventDefault();
                }
                if (key === 'ArrowLeft' || key === 'Left') keys.left = true;
                else if (key === 'ArrowRight' || key === 'Right') keys.right = true;
                else if (key === ' ' || key === 'Space') keys.space = true;
            }

            function handleKeyUp(e) {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'Left' || key === 'ArrowRight' || key === 'Right' || key === ' ' || key === 'Space') {
                    e.preventDefault();
                }
                if (key === 'ArrowLeft' || key === 'Left') keys.left = false;
                else if (key === 'ArrowRight' || key === 'Right') keys.right = false;
                else if (key === ' ' || key === 'Space') keys.space = false;
            }

            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);

            // Touch controls
            function handleTouchStart(btn, key) {
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; }, { passive: false });
                btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
                btn.addEventListener('touchcancel', (e) => { e.preventDefault(); keys[key] = false; });
                btn.addEventListener('mousedown', (e) => { e.preventDefault(); keys[key] = true; });
                btn.addEventListener('mouseup', (e) => { e.preventDefault(); keys[key] = false; });
                btn.addEventListener('mouseleave', () => { keys[key] = false; });
            }
            handleTouchStart(touchLeft, 'left');
            handleTouchStart(touchRight, 'right');
            handleTouchStart(touchFire, 'space');

            canvas.addEventListener('touchstart', (e) => e.preventDefault());
            canvas.addEventListener('touchmove', (e) => e.preventDefault());

            // ---------- GAME FUNCTIONS ----------
            function updateDisplay() {
                levelSpan.textContent = level;
                scoreSpan.textContent = score;
                livesSpan.textContent = lives;
            }

            function resetGame() {
                gameActive = true;
                gameOverMessage = '';
                level = 1;
                score = 0;
                lives = 3;
                invulnerableFrames = 0;
                lasers = [];
                enemyBullets = [];
                explosions = [];
                enemyDirection = 1;
                levelTransitionTimer = 0;
                bossActive = false;
                bossShootTimer = 0;
                player.x = W/2 - 30;
                spawnLevel(level);
                updateDisplay();
            }

            function spawnLevel(level) {
                enemies = [];
                bossActive = false;

                // Level 10: HUGE MONSTER BOSS
                if (level === 10) {
                    bossActive = true;
                    // Create a massive boss enemy
                    enemies.push({
                        x: W/2 - 100,
                        y: 50,
                        w: 200,
                        h: 120,
                        type: 'boss',
                        hp: 40,
                        maxHp: 40,
                        color: '#ff0000',
                        frame: 0
                    });
                    return;
                }

                // Normal level spawning (as before)
                const rows = Math.min(3 + Math.floor(level / 1.5), 7);
                const cols = 9;
                const startX = 120;
                const startY = 60;
                const colSpacing = 75;
                const rowSpacing = 55;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        let type = 'standard';
                        let hp = 1;
                        let color = '#4afcff';
                        
                        if (r === 0) { 
                            type = 'elite'; 
                            hp = 2; 
                            color = '#ffaa44'; 
                        }
                        else if (r === rows-1) { 
                            if (level >= 3 && Math.random() < 0.4) {
                                type = 'ufo';
                                hp = 3;
                                color = '#ff55ff';
                            } else {
                                type = 'scout';
                                hp = 1;
                                color = '#ff66aa';
                            }
                        }
                        else {
                            if (level >= 5 && Math.random() < 0.2) {
                                type = 'ufo';
                                hp = 3;
                                color = '#ff55ff';
                            } else if (level >= 4 && Math.random() < 0.3) {
                                type = 'elite';
                                hp = 2;
                                color = '#ffaa44';
                            } else {
                                type = 'standard';
                                hp = 1;
                                color = '#4afcff';
                            }
                        }

                        enemies.push({
                            x: startX + c * colSpacing,
                            y: startY + r * rowSpacing,
                            w: 44,
                            h: 36,
                            type: type,
                            hp: hp,
                            color: color,
                            frame: Math.random() * 10
                        });
                    }
                }
            }

            function playerHit() {
                if (invulnerableFrames > 0) return;
                lives--;
                playGameOver();
                updateDisplay();
                if (lives <= 0) {
                    gameActive = false;
                    gameOverMessage = '💀 GAME OVER';
                } else {
                    invulnerableFrames = 90;
                }
            }

            function nextLevel() {
                level++;
                lasers = [];
                enemyBullets = [];
                explosions = [];
                enemyDirection = 1;
                bossActive = false;
                bossShootTimer = 0;
                spawnLevel(level);
                if (level !== 10) playLevelUp(); // Boss level has its own music?
                updateDisplay();
                levelTransitionTimer = 0;
            }

            function addExplosion(x, y) {
                explosions.push({ x, y, frames: 0, maxFrames: 12 });
                playExplosion();
            }

            function rectCollide(r1, r2) {
                return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x ||
                         r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
            }

            // ---------- UPDATE ----------
            function update() {
                if (!gameActive) return;

                if (levelTransitionTimer > 0) {
                    levelTransitionTimer--;
                    if (levelTransitionTimer === 0) nextLevel();
                    return;
                }

                if (enemies.length === 0) {
                    levelTransitionTimer = LEVEL_TRANSITION_DELAY;
                    return;
                }

                // Player move
                if (keys.left) player.x = Math.max(10, player.x - 7);
                if (keys.right) player.x = Math.min(W - player.w - 10, player.x + 7);

                // Shooting
                if (keys.space && laserCooldown <= 0) {
                    lasers.push({
                        x: player.x + player.w/2 - 4,
                        y: player.y - 15,
                        w: 8,
                        h: 22
                    });
                    playLaser();
                    laserCooldown = LASER_COOLDOWN;
                }
                if (laserCooldown > 0) laserCooldown--;

                // Move lasers
                for (let i = lasers.length - 1; i >= 0; i--) {
                    lasers[i].y += LASER_SPEED;
                    if (lasers[i].y + lasers[i].h < 0) lasers.splice(i, 1);
                }

                // Move enemies (boss behaves differently)
                let changeDir = false;
                for (let e of enemies) {
                    if (e.type === 'boss') {
                        // Boss only moves horizontally slowly, never steps down
                        e.x += ENEMY_BASE_SPEED * 0.8 * enemyDirection; // slower
                        if (e.x <= 20 || e.x + e.w >= W - 20) {
                            // change direction but don't step down
                            enemyDirection *= -1;
                        }
                    } else {
                        e.x += ENEMY_BASE_SPEED * enemyDirection;
                        if (e.x <= 15 || e.x + e.w >= W - 15) changeDir = true;
                    }
                }
                if (changeDir && !bossActive) {
                    enemyDirection *= -1;
                    for (let e of enemies) {
                        if (e.type !== 'boss') e.y += ENEMY_STEP_DOWN;
                    }
                }

                // Boss shooting
                if (bossActive) {
                    bossShootTimer++;
                    if (bossShootTimer >= 40) { // shoot every 40 frames
                        bossShootTimer = 0;
                        // Find boss
                        const boss = enemies.find(e => e.type === 'boss');
                        if (boss) {
                            // Shoot three bullets in a spread
                            for (let i = -1; i <= 1; i++) {
                                enemyBullets.push({
                                    x: boss.x + boss.w/2 - 5,
                                    y: boss.y + boss.h,
                                    w: 10,
                                    h: 20,
                                    speed: 5 + i * 1.5,
                                    angle: i * 0.2 // not used but for show
                                });
                            }
                        }
                    }
                } else {
                    // Regular enemy shooting
                    if (enemies.length > 0 && Math.random() < 0.018) {
                        let shooterIndex = Math.floor(Math.random() * enemies.length);
                        let shooter = enemies[shooterIndex];
                        enemyBullets.push({
                            x: shooter.x + shooter.w/2 - 4,
                            y: shooter.y + shooter.h,
                            w: 8,
                            h: 18,
                            speed: shooter.type === 'ufo' ? 6.5 : 5.5
                        });
                        if (shooter.type === 'ufo' && Math.random() < 0.5) {
                            enemyBullets.push({
                                x: shooter.x + shooter.w/2 - 4,
                                y: shooter.y + shooter.h,
                                w: 8,
                                h: 18,
                                speed: 6.5
                            });
                        }
                    }
                }

                // Move enemy bullets
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    enemyBullets[i].y += enemyBullets[i].speed;
                    if (enemyBullets[i].y > H) enemyBullets.splice(i, 1);
                }

                // Laser-enemy collision
                for (let i = lasers.length - 1; i >= 0; i--) {
                    const laser = lasers[i];
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const enemy = enemies[j];
                        if (rectCollide(laser, enemy)) {
                            enemy.hp--;
                            lasers.splice(i, 1);
                            if (enemy.hp <= 0) {
                                addExplosion(enemy.x + enemy.w/2, enemy.y + enemy.h/2);
                                enemies.splice(j, 1);
                                if (enemy.type === 'boss') {
                                    score += 100; // big bonus
                                    bossActive = false;
                                } else {
                                    score += 10 + level * 5;
                                }
                                updateDisplay();
                            }
                            break;
                        }
                    }
                }

                // Player vs enemy collision
                if (invulnerableFrames > 0) invulnerableFrames--;
                const playerRect = { x: player.x, y: player.y, w: player.w, h: player.h };
                for (let enemy of enemies) {
                    if (rectCollide(playerRect, enemy)) {
                        playerHit();
                        addExplosion(enemy.x + enemy.w/2, enemy.y + enemy.h/2);
                        enemies = enemies.filter(e => e !== enemy);
                        break;
                    }
                }

                // Player vs bullet
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const bullet = enemyBullets[i];
                    if (rectCollide(playerRect, bullet)) {
                        playerHit();
                        enemyBullets.splice(i, 1);
                        break;
                    }
                }

                // Enemy reaching bottom (except boss)
                for (let enemy of enemies) {
                    if (enemy.type !== 'boss' && enemy.y + enemy.h > H - 50) {
                        gameActive = false;
                        gameOverMessage = '💀 INVASION';
                        playGameOver();
                        break;
                    }
                }

                // Update explosions
                for (let i = explosions.length - 1; i >= 0; i--) {
                    explosions[i].frames++;
                    if (explosions[i].frames >= explosions[i].maxFrames) {
                        explosions.splice(i, 1);
                    }
                }

                thrusterPhase = (thrusterPhase + 0.3) % (2 * Math.PI);
                ufoLightPhase = (ufoLightPhase + 0.1) % (2 * Math.PI);
            }

            // ---------- RENDERING ----------
            function drawStars() {
                if (!window.stars) {
                    window.stars = [];
                    for (let i = 0; i < 250; i++) {
                        window.stars.push({
                            x: Math.random() * W,
                            y: Math.random() * H,
                            size: Math.random() * 2.5 + 1,
                            bright: Math.random() * 0.6 + 0.2
                        });
                    }
                }
                for (let s of window.stars) {
                    ctx.fillStyle = `rgba(255,255,200,${s.bright})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, 2*Math.PI);
                    ctx.fill();
                }
            }

            function drawPlayer() {
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#ffaa33';
                const flameY = player.y + player.h - 8 + Math.sin(thrusterPhase) * 4;
                ctx.beginPath();
                ctx.moveTo(player.x + player.w/2 - 12, flameY);
                ctx.lineTo(player.x + player.w/2, flameY + 22);
                ctx.lineTo(player.x + player.w/2 + 12, flameY);
                ctx.fill();

                ctx.shadowColor = '#0ff';
                ctx.shadowBlur = 35;
                ctx.fillStyle = '#b5f0ff';
                ctx.beginPath();
                ctx.moveTo(player.x + player.w/2, player.y - 8);
                ctx.lineTo(player.x + player.w - 12, player.y + player.h - 12);
                ctx.lineTo(player.x + player.w - 20, player.y + player.h - 12);
                ctx.lineTo(player.x + player.w - 20, player.y + player.h - 4);
                ctx.lineTo(player.x + 20, player.y + player.h - 4);
                ctx.lineTo(player.x + 20, player.y + player.h - 12);
                ctx.lineTo(player.x + 12, player.y + player.h - 12);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#7fd0ff';
                ctx.beginPath();
                ctx.moveTo(player.x + 5, player.y + player.h - 16);
                ctx.lineTo(player.x - 8, player.y + player.h - 4);
                ctx.lineTo(player.x + 12, player.y + player.h - 4);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(player.x + player.w - 5, player.y + player.h - 16);
                ctx.lineTo(player.x + player.w + 8, player.y + player.h - 4);
                ctx.lineTo(player.x + player.w - 12, player.y + player.h - 4);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#c0ffff';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.ellipse(player.x + player.w/2, player.y - 2, 10, 6, 0, 0, 2*Math.PI);
                ctx.fill();

                ctx.fillStyle = '#aaf0ff';
                ctx.beginPath();
                ctx.ellipse(player.x + player.w/2 - 3, player.y - 4, 3, 2, 0, 0, 2*Math.PI);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(player.x + player.w/2 + 3, player.y - 4, 3, 2, 0, 0, 2*Math.PI);
                ctx.fill();

                if (invulnerableFrames > 0 && (Math.floor(Date.now() / 120) % 2 === 0)) {
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 4;
                    ctx.shadowBlur = 40;
                    ctx.stroke();
                }
            }

            function drawEnemies() {
                for (let e of enemies) {
                    if (e.type === 'boss') {
                        // Draw huge monster
                        ctx.shadowColor = '#ff3300';
                        ctx.shadowBlur = 40;
                        // Main body
                        ctx.fillStyle = '#aa2222';
                        ctx.beginPath();
                        ctx.ellipse(e.x + e.w/2, e.y + e.h/2, e.w/2.2, e.h/2.2, 0, 0, 2*Math.PI);
                        ctx.fill();
                        // Armor plates
                        ctx.fillStyle = '#cc5500';
                        ctx.fillRect(e.x + 30, e.y + 20, 40, 15);
                        ctx.fillRect(e.x + e.w - 70, e.y + 20, 40, 15);
                        // Eyes
                        ctx.fillStyle = '#ffff00';
                        ctx.beginPath();
                        ctx.arc(e.x + 50, e.y + 40, 12, 0, 2*Math.PI);
                        ctx.arc(e.x + e.w - 50, e.y + 40, 12, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(e.x + 45, e.y + 35, 5, 0, 2*Math.PI);
                        ctx.arc(e.x + e.w - 55, e.y + 35, 5, 0, 2*Math.PI);
                        ctx.fill();
                        // Teeth
                        ctx.fillStyle = '#ffffff';
                        for (let i = 0; i < 5; i++) {
                            ctx.fillRect(e.x + 60 + i*20, e.y + 70, 8, 15);
                        }
                        // Health bar
                        const healthPercent = e.hp / e.maxHp;
                        ctx.fillStyle = '#0f0';
                        ctx.fillRect(e.x, e.y - 20, e.w * healthPercent, 10);
                        ctx.strokeStyle = '#fff';
                        ctx.strokeRect(e.x, e.y - 20, e.w, 10);
                    } else {
                        // Regular enemies (same as before)
                        ctx.shadowColor = e.color;
                        ctx.shadowBlur = 28;
                        if (e.type === 'ufo') {
                            ctx.fillStyle = '#cc88ff';
                            ctx.beginPath();
                            ctx.ellipse(e.x + e.w/2, e.y + e.h/2 - 4, e.w/2.5, e.h/4, 0, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.fillStyle = '#aa66ee';
                            ctx.beginPath();
                            ctx.ellipse(e.x + e.w/2, e.y + e.h/2 + 2, e.w/3, e.h/5, 0, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.fillStyle = '#ffccff';
                            ctx.beginPath();
                            ctx.arc(e.x + e.w/2, e.y + e.h/2 - 8, 10, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.fillStyle = `hsl(${60 + Math.sin(ufoLightPhase)*30}, 100%, 70%)`;
                            ctx.beginPath();
                            ctx.arc(e.x + e.w/2, e.y + e.h/2 - 12, 3, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.fillStyle = '#000';
                            ctx.beginPath();
                            ctx.arc(e.x + e.w/2 - 5, e.y + e.h/2 - 10, 2, 0, 2*Math.PI);
                            ctx.arc(e.x + e.w/2 + 5, e.y + e.h/2 - 10, 2, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.fillStyle = '#aaa';
                            ctx.fillRect(e.x + e.w/2 - 3, e.y + e.h/2 + 2, 6, 6);
                        } else if (e.type === 'elite') {
                            ctx.fillStyle = '#ffaa44';
                            ctx.beginPath();
                            ctx.ellipse(e.x + e.w/2, e.y + e.h/2, e.w/2.5, e.h/3, 0, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.fillStyle = '#cc8800';
                            ctx.fillRect(e.x + 10, e.y + 5, 8, 12);
                            ctx.fillRect(e.x + e.w - 18, e.y + 5, 8, 12);
                            ctx.fillStyle = '#ffaa00';
                            ctx.fillRect(e.x + 8, e.y - 8, 6, 12);
                            ctx.fillRect(e.x + e.w - 14, e.y - 8, 6, 12);
                        } else if (e.type === 'scout') {
                            ctx.fillStyle = '#ff66aa';
                            ctx.beginPath();
                            ctx.ellipse(e.x + e.w/2, e.y + e.h/2, e.w/3, e.h/2.5, 0, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.moveTo(e.x + e.w/3, e.y - 5);
                            ctx.lineTo(e.x + e.w/3, e.y - 18);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.arc(e.x + e.w/3, e.y - 20, 3, 0, 2*Math.PI);
                            ctx.fillStyle = '#ff0';
                            ctx.fill();
                        } else {
                            ctx.fillStyle = '#4afcff';
                            ctx.beginPath();
                            ctx.ellipse(e.x + e.w/2, e.y + e.h/2, e.w/2.8, e.h/3.2, 0, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.fillStyle = '#aaf0ff';
                            ctx.beginPath();
                            ctx.ellipse(e.x + e.w/2 - 2, e.y + e.h/2 - 4, 4, 3, 0, 0, 2*Math.PI);
                            ctx.fill();
                        }

                        if (e.type !== 'ufo' && e.type !== 'scout') {
                            ctx.fillStyle = '#000';
                            ctx.shadowBlur = 0;
                            ctx.beginPath();
                            ctx.arc(e.x + e.w/3, e.y + e.h/2.5, 3, 0, 2*Math.PI);
                            ctx.arc(e.x + 2*e.w/3, e.y + e.h/2.5, 3, 0, 2*Math.PI);
                            ctx.fill();
                        }
                    }
                }
            }

            function drawLasers() {
                ctx.shadowColor = '#ff66aa';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#fffeca';
                for (let l of lasers) {
                    ctx.fillRect(l.x, l.y, l.w, l.h);
                }
            }

            function drawEnemyBullets() {
                ctx.shadowColor = '#ff3300';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#ff8870';
                for (let b of enemyBullets) {
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }
            }

            function drawExplosions() {
                for (let ex of explosions) {
                    const progress = ex.frames / ex.maxFrames;
                    const size = 24 * (1 - progress) + 8;
                    ctx.shadowColor = 'orange';
                    ctx.shadowBlur = 30;
                    ctx.fillStyle = `rgba(255, 150, 0, ${1 - progress})`;
                    ctx.beginPath();
                    ctx.arc(ex.x, ex.y, size, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.fillStyle = `rgba(255, 255, 100, ${1 - progress})`;
                    ctx.beginPath();
                    ctx.arc(ex.x-4, ex.y-4, size*0.5, 0, 2*Math.PI);
                    ctx.fill();
                }
            }

            function drawUI() {
                if (levelTransitionTimer > 0) {
                    ctx.fillStyle = 'rgba(0,40,50,0.8)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.font = 'bold 70px "Segoe UI", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = '#0ff';
                    ctx.shadowBlur = 50;
                    ctx.fillText(level === 10 ? '⚡ BOSS LEVEL ⚡' : `LEVEL ${level+1}`, W/2, H/2-30);
                    ctx.font = '40px monospace';
                    ctx.fillText('⚡ PREPARE ⚡', W/2, H/2+40);
                    ctx.shadowBlur = 0;
                }

                if (!gameActive && gameOverMessage) {
                    ctx.fillStyle = 'rgba(20,0,25,0.8)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.font = 'bold 70px "Segoe UI"';
                    ctx.fillStyle = '#ffaaaa';
                    ctx.shadowColor = '#f0f';
                    ctx.shadowBlur = 50;
                    ctx.fillText(gameOverMessage, W/2, H/2-30);
                    ctx.font = '40px monospace';
                    ctx.fillStyle = '#aaffff';
                    ctx.fillText('⟲ RESTART', W/2, H/2+50);
                    ctx.shadowBlur = 0;
                }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                drawStars();
                drawEnemies();
                drawEnemyBullets();
                drawLasers();
                drawExplosions();
                drawPlayer();
                drawUI();
                ctx.shadowBlur = 0;
            }

            // ---------- RESTART ----------
            restartBtn.addEventListener('click', resetGame);

            // ---------- GAME LOOP ----------
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            window.stars = [];
            for (let i = 0; i < 250; i++) {
                window.stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 2.5 + 1,
                    bright: Math.random() * 0.6 + 0.2
                });
            }

            resetGame();
            gameLoop();

            canvas.addEventListener('contextmenu', e => e.preventDefault());
        })();
    </script>
</body>
</html>
